<!DOCTYPE html>
<html>
<head>
    <title>Parent Dashboard</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="top-nav">
    <div class="nav-left">
        <h2>Smart Learning</h2>
    </div>
    <div class="nav-right">
        <span id="userDisplay">Welcome, Parent</span>
        <a href="index.html" class="logout-btn">Logout</a>
    </div>
</div>

<h2 class="page-title">Parent Dashboard</h2>

<div class="parent-container">
    <div class="parent-card">
        <h3>My Child's Progress</h3>
        <div id="child-progress">
            <p>Child: John Doe</p>
            <p>Class: 10</p>
            <p>Recent Scores:</p>
            <ul>
                <li>Math: 80/100</li>
                <li>Physics: 70/100</li>
            </ul>
        </div>
    </div>
    
    <div class="parent-card">
        <h3>Reports</h3>
        <button>Download Report</button>
        <button>View Attendance</button>
    </div>
</div>

<script src="script.js"></script>
</body>
</html>
