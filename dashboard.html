<!DOCTYPE html>
<html>
<head>
    <title>Student Dashboard</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="top-nav">
    <div class="nav-left">
        <h2>LearnSmart</h2>
    </div>
    <div class="nav-right">
        <span id="userDisplay">Welcome, </span>
        <a href="index.html" class="logout-btn">Logout</a>
    </div>
</div>

<h2 class="page-title">Student Dashboard</h2>

<div class="dashboard-cards">
    <div class="card" onclick="showSection('profile')">
        <h3>Profile</h3>
        <p>View your details</p>
    </div>
    
    <div class="card" onclick="showSection('videos')">
        <h3>Videos</h3>
        <p>Watch lectures</p>
    </div>
    
    <div class="card" onclick="showSection('tests')">
        <h3>Tests</h3>
        <p>Take practice tests</p>
    </div>
    
    <div class="card" onclick="showSection('ebooks')">
        <h3>E-Books</h3>
        <p>Study materials</p>
    </div>
</div>

<div id="content" class="content-section"></div>

<script src="script.js"></script>
</body>
</html>
