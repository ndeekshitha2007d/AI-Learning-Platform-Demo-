<!DOCTYPE html>
<html>
<head>
    <title>Learning Platform</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="main-container">
    <div class="left-panel">
        <img src="image/WhatsApp Image 2026-03-03 at 8.42.11 PM.jpeg" alt="Background">
        <div class="left-content">
            <h2>Smart Learning Platform</h2>
            <p>Learn with friends, compete, grow!</p>
        </div>
    </div>
    
    <div class="right-panel">
        <div class="login-tabs">
            <button class="tab-btn active" onclick="showTab('student')">Student</button>
            <button class="tab-btn" onclick="showTab('parent')">Parent</button>
        </div>
        
        <!-- Student Login -->
        <div id="student-login" class="login-form">
            <h2>Student Login</h2>
            <form id="studentLoginForm">
                <div class="input-row">
                    <label>Email</label>
                    <input type="email" id="student-email" required>
                </div>
                <div class="input-row">
                    <label>Password</label>
                    <input type="password" id="student-password" required>
                </div>
                <button type="submit">Login</button>
                <p class="link-text">New student? <a href="#" onclick="showRegister()">Register here</a></p>
            </form>
        </div>
        
        <!-- Parent Login -->
        <div id="parent-login" class="login-form" style="display:none">
            <h2>Parent Login</h2>
            <form id="parentLoginForm">
                <div class="input-row">
                    <label>Email</label>
                    <input type="email" id="parent-email" required>
                </div>
                <div class="input-row">
                    <label>Password</label>
                    <input type="password" id="parent-password" required>
                </div>
                <button type="submit">Login</button>
                <p class="link-text">New parent? Contact admin</p>
            </form>
        </div>
        
        <!-- Student Registration -->
        <div id="student-register" class="login-form" style="display:none">
            <h2>Student Registration</h2>
            <form id="studentRegisterForm">
                <div class="input-row">
                    <label>Full Name</label>
                    <input type="text" id="reg-name" required>
                </div>
                <div class="input-row">
                    <label>Email</label>
                    <input type="email" id="reg-email" required>
                </div>
                <div class="input-row">
                    <label>Password</label>
                    <input type="password" id="reg-password" required>
                </div>
                <div class="input-row">
                    <label>Class</label>
                    <select id="reg-class">
                        <option value="5">Class 5</option>
                        <option value="6">Class 6</option>
                        <option value="7">Class 7</option>
                        <option value="8">Class 8</option>
                        <option value="9">Class 9</option>
                        <option value="10">Class 10</option>
                        <option value="11">Class 11</option>
                        <option value="12">Class 12</option>
                    </select>
                </div>
                <div class="input-row">
                    <label>Parent Email</label>
                    <input type="email" id="reg-parent" required>
                </div>
                <button type="submit">Register</button>
                <p class="link-text">Already have account? <a href="#" onclick="showTab('student')">Login here</a></p>
            </form>
        </div>
    </div>
</div>

<script src="script.js"></script>
</body>
</html>
