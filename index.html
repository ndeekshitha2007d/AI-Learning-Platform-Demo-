<!DOCTYPE html>
<html>
<head>
    <title>Student Login - Learn with AI</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="main-container">
    <div class="left-panel">
        <!-- PASTE YOUR IMAGE LINK HERE: replace the text inside src -->
        <img src="YOUR_IMAGE_LINK_HERE" alt="Background Image">
        <div class="left-content">
            <h2>LearnSmart</h2>
            <p>Personalized Learning Platform</p>
            <p>For Classes 5 to 12</p>
        </div>
    </div>
    
    <div class="right-panel">
        <div class="login-form">
            <h2>Student Login</h2>
            <form id="loginForm">
                <div class="input-row">
                    <label>Full Name</label>
                    <input type="text" id="name" placeholder="Enter your name" required>
                </div>
                
                <div class="input-row">
                    <label>Email Address</label>
                    <input type="email" id="email" placeholder="Enter your email" required>
                </div>
                
                <div class="input-row">
                    <label>Password</label>
                    <input type="password" id="password" placeholder="Enter password" required>
                </div>
                
                <div class="remember">
                    <input type="checkbox" id="remember"> 
                    <label for="remember">Remember me</label>
                </div>
                
                <button type="submit">Login</button>
                
                <div class="links">
                    <a href="#">Forgot Password?</a>
                    <a href="#">New Student? Register</a>
                </div>
            </form>
        </div>
    </div>
</div>

<script src="script.js"></script>
</body>
</html>
