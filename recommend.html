<!DOCTYPE html>
<html>
<head>
    <title>Course Recommendation</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="top-nav">
    <div class="nav-left">
        <h2>LearnSmart</h2>
    </div>
    <div class="nav-right">
        <a href="index.html" class="logout-btn">Logout</a>
    </div>
</div>

<div class="form-container">
    <h2>Get Your Course Recommendation</h2>
    <p>Fill in your details to get personalized course suggestion</p>
    
    <form id="studentForm">
        <div class="form-field">
            <label>Student Name *</label>
            <input type="text" id="studentName" placeholder="Enter your full name" required>
        </div>
        
        <div class="form-field">
            <label>Select Class *</label>
            <select id="class" required>
                <option value="">-- Select Class --</option>
                <option value="5">Class 5</option>
                <option value="6">Class 6</option>
                <option value="7">Class 7</option>
                <option value="8">Class 8</option>
                <option value="9">Class 9</option>
                <option value="10">Class 10</option>
                <option value="11">Class 11</option>
                <option value="12">Class 12</option>
            </select>
        </div>
        
        <div class="form-field">
            <label>Select Subject *</label>
            <select id="subject" required>
                <option value="">-- Select Subject --</option>
                <option value="math">Mathematics</option>
                <option value="physics">Physics</option>
                <option value="chemistry">Chemistry</option>
                <option value="biology">Biology</option>
                <option value="python">Python Programming</option>
            </select>
        </div>
        
        <div class="form-field">
            <label>Your Goal (Optional)</label>
            <input type="text" id="goal" placeholder="e.g., JEE, Boards, Coding">
        </div>
        
        <button type="submit" class="submit-btn">Get Recommendation</button>
    </form>
    
    <div id="result" class="result-box" style="display: none;"></div>
</div>

<script src="script.js"></script>
</body>
</html>
